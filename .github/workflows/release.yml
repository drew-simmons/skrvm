name: Release & Build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please & Changelog Format
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout Release PR Branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.pr != '' && fromJSON(steps.release.outputs.pr).head_branch || steps.release.outputs['.--pr'] != '' && fromJSON(steps.release.outputs['.--pr']).head_branch || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python & uv
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: astral-sh/setup-uv@v7

      - name: Format CHANGELOG.md
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          uvx rumdl check --config 'MD013.code-blocks=false' --config 'MD013.reflow=true' --disable MD036,MD041 --fix CHANGELOG.md

      - name: Commit & Push Formatted CHANGELOG.md
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --exit-code CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "chore: format CHANGELOG.md using rumdl"
            git push
          else
            echo "CHANGELOG.md is already formatted correctly."
          fi

  build-tauri:
    name: Build & Upload Tauri App
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "windows-latest"
          - platform: "ubuntu-22.04"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: "Skrvm v__VERSION__"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
